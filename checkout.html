<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LeadOS — Secure Checkout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
  body { background-color: #fdf8f8; color: #1c1b1b; font-family: Inter, sans-serif; overflow-x: hidden; }
  .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #000; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center justify-center p-6">

<div id="loading" class="text-center">
  <div class="spinner mx-auto mb-6"></div>
  <h1 class="text-2xl font-bold mb-2">Opening Secure Checkout...</h1>
  <p class="text-gray-600">You'll be redirected to Paddle's secure payment page.</p>
</div>

<div id="error" class="hidden text-center max-w-md">
  <div class="bg-red-50 border border-red-200 rounded-2xl p-8">
    <span class="material-symbols-outlined text-5xl text-red-500 mb-4">error</span>
    <h1 class="text-xl font-bold text-red-900 mb-2">Checkout Error</h1>
    <p id="error-message" class="text-red-700 mb-6">Something went wrong.</p>
    <a href="https://t.me/LeadOS_CoBot" target="_blank" class="inline-block bg-black text-white px-6 py-3 rounded-full font-medium hover:bg-gray-800 transition-colors">Open Telegram Bot</a>
  </div>
</div>

<div id="success" class="hidden text-center max-w-md">
  <div class="bg-green-50 border border-green-200 rounded-2xl p-8">
    <span class="material-symbols-outlined text-5xl text-green-600 mb-4" style="font-variation-settings: 'FILL' 1;">check_circle</span>
    <h1 class="text-xl font-bold text-green-900 mb-2">Payment Successful!</h1>
    <p class="text-green-700 mb-6">Your plan has been activated. Redirecting you to the bot...</p>
    <a id="success-link" href="https://t.me/LeadOS_CoBot" target="_blank" class="inline-block bg-black text-white px-6 py-3 rounded-full font-medium hover:bg-gray-800 transition-colors">Open LeadOS Bot</a>
  </div>
</div>

<!-- Paddle.js — automatically detects _ptxn parameter in URL and opens checkout -->
<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<script>
  // =================================================================
  //  LEADOS CHECKOUT PAGE
  //  =================================================================
  //  This page receives users from Paddle's transaction API.
  //  Paddle appends ?_ptxn=txn_xxx to the URL. Paddle.js automatically
  //  detects this parameter and opens the checkout overlay.
  //
  //  Flow: Bot creates transaction → Paddle returns checkout URL →
  //  user opens URL → this page loads → Paddle.js detects _ptxn →
  //  checkout overlay opens → user pays → webhook fires → bot upgrades.
  // =================================================================

  var PADDLE_CONFIG = {
    clientToken: 'live_abe44b07b980b548ce8dba106cb',
    environment: 'production',
    botUrl: 'https://t.me/LeadOS_CoBot'
  };

  function showError(msg) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('error').classList.remove('hidden');
    document.getElementById('error-message').textContent = msg;
  }

  // Initialize Paddle — Paddle.js will automatically detect _ptxn in the URL
  // and open the checkout overlay for that transaction.
  Paddle.Initialize({
    token: PADDLE_CONFIG.clientToken,
    environment: PADDLE_CONFIG.environment,
    eventCallback: function(data) {
      console.log('Paddle event:', data.name);
      if (data.name === 'checkout.completed') {
        // Payment successful — show success state
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('success').classList.remove('hidden');
        // Redirect to bot after 2 seconds
        setTimeout(function() {
          window.location.href = PADDLE_CONFIG.botUrl + '?start=activate';
        }, 2000);
      } else if (data.name === 'checkout.closed') {
        // User closed the checkout
        showError('Checkout was cancelled. Use /upgrade in the Telegram bot to try again.');
      } else if (data.name === 'checkout.error') {
        showError('Checkout error. Please try again using /upgrade in the Telegram bot.');
      }
    }
  });

  // Fallback: if no _ptxn parameter, check for plan param (direct link mode)
  var params = new URLSearchParams(window.location.search);
  var txnId = params.get('_ptxn');
  var plan = params.get('plan');

  if (!txnId && plan) {
    // No transaction ID but plan is specified — open checkout directly by price ID
    var priceIds = {
      freelancer: 'pri_01kxfzms96hf32fhex7r61p7nd',
      marketing_pro: 'pri_01kxfzthwv0dddcbvvntpy42k0'
    };
    var priceId = priceIds[plan];
    if (priceId) {
      setTimeout(function() {
        Paddle.Checkout.open({
          items: [{ priceId: priceId, quantity: 1 }],
          customData: {
            telegramId: params.get('tg') || 'unknown',
            plan: plan,
            reference: params.get('ref') || ('direct_' + Date.now())
          }
        });
      }, 2000);
    } else {
      showError('Invalid plan. Use /upgrade in the Telegram bot.');
    }
  }

  // If _ptxn IS present, Paddle.js handles it automatically — nothing more to do.
  // The checkout overlay will open on its own.
</script>
</body>
</html>
